services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: notifier
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  notifier:
    build: .
    ports:
      - "8080:8080"
    environment:
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8080"
      POSTGRES_DSN: "postgres://postgres:postgres@postgres:5432/notifier?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      WORKER_POOL_SIZE: "10"
      WORKER_MAX_RETRIES: "5"
      WORKER_RATE_LIMIT_PER_SEC: "100"
      DELIVERY_WEBHOOK_BASE_URL: "https://webhook.site"
      DELIVERY_EMAIL_PATH: "/email"
      DELIVERY_SMS_PATH: "/sms"
      DELIVERY_PUSH_PATH: "/push"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
